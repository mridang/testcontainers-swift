name: Release

on:
  push:
    branches:
      - master

permissions:
  contents: write
  id-token: write
  actions: write

defaults:
  run:
    working-directory: ./

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.1"

      - name: Cache Swift packages
        uses: actions/cache@v4
        with:
          path: .build
          key: ${{ runner.os }}-spm-${{ hashFiles('Package.resolved') }}

      - name: Record current latest tag
        id: before
        run: |
          git fetch --tags
          echo "tag=$(git tag -l 'v*' --sort=-version:refname | head -1)" >> "$GITHUB_OUTPUT"

      - name: Semantic release
        uses: mridang/action-semantic-release@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Detect new release
        id: detect
        run: |
          git fetch --tags --force
          LATEST=$(git tag -l 'v*' --sort=-version:refname | head -1)
          if [ "$LATEST" != "${{ steps.before.outputs.tag }}" ] && [ -n "$LATEST" ]; then
            echo "released=true" >> "$GITHUB_OUTPUT"
            echo "new_tag=$LATEST" >> "$GITHUB_OUTPUT"
          else
            echo "released=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Dispatch publish workflow on new tag
        if: steps.detect.outputs.released == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'publish.yml',
              ref: '${{ steps.detect.outputs.new_tag }}'
            });
            core.info('Dispatched publish.yml at ${{ steps.detect.outputs.new_tag }}');
