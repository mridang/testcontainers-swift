name: Lint Code (swiftlint)

on: push

permissions:
  contents: write

defaults:
  run:
    working-directory: ./

jobs:
  code-linting:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install SwiftLint
        run: |
          curl -sSL "https://github.com/realm/SwiftLint/releases/download/0.58.2/swiftlint_linux.zip" -o /tmp/sl.zip
          unzip -q /tmp/sl.zip -d /tmp/sl
          sudo install -m 755 /tmp/sl/swiftlint /usr/local/bin/
          swiftlint version

      - name: Run SwiftLint
        run: swiftlint lint --strict Sources Tests
