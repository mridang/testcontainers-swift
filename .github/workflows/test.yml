name: Run Tests (swift test)

on: push

permissions:
  contents: write

defaults:
  run:
    working-directory: ./

jobs:
  app-testing:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Cache Docker layers
        uses: actions/cache@v5
        with:
          path: ./docker_images
          key: ${{ runner.os }}-docker-${{ hashFiles('**/compose.yaml', '**/docker-compose.yaml') }}
          restore-keys: |
            ${{ runner.os }}-docker-

      - name: Docker pull
        run: |
          mkdir -p docker_images
          if [ -f docker_images/combined_images.tar ]; then
            docker image load -i docker_images/combined_images.tar
          else
            docker pull alpine:latest
            docker pull nginx:alpine-slim
            docker image save alpine:latest nginx:alpine-slim -o docker_images/combined_images.tar
          fi

      - name: Setup Swift
        uses: swift-actions/setup-swift@v3
        with:
          swift-version: "6.2"

      - name: Cache Swift packages
        uses: actions/cache@v5
        with:
          path: .build
          key: ${{ runner.os }}-spm-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Build
        run: swift build

      - name: Test
        run: swift test --enable-code-coverage

      - name: Export coverage
        if: always()
        run: |
          mkdir -p .out
          BINPATH=$(swift build --show-bin-path)
          BINARY="$BINPATH/testcontainers-swiftPackageTests"
          PROFDATA="$BINPATH/codecov/default.profdata"
          if [ -f "$PROFDATA" ]; then
            llvm-cov export -format=lcov "$BINARY" -instr-profile "$PROFDATA" > .out/lcov.info || true
          fi

      - name: Generate coverage
        if: always()
        continue-on-error: true
        uses: mridang/action-test-reporter@v3
        with:
          results-path: '.out/junit.xml'
          coverage-path: '.out/lcov.info'
